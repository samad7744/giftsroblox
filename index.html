<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/devices.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Free Currency1!</title>

    <!-- CSS مخصص لتصميم أسطوري -->
    <style>
        /* خلفية موحدة للصفحتين بصورة foobloooc */
        body, .device-content {
            background: url('img/foobloooc.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* صورة roblooox دائرية واحترافية */
        .roblox-logo {
            width: 120px !important;
            border-radius: 50%;
            border: 4px solid #8704eb;
            box-shadow: 0 0 20px #00FF00, 0 0 40px #FFFF00;
            transition: transform 0.3s ease;
        }

        .roblox-logo:hover {
            transform: scale(1.1);
        }

        /* ستايل العناوين */
        h2, h5 {
            color: #FFFFFF;
            text-shadow: 0 0 15px #00FF00, 0 0 30px #FFFF00;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
        }

        /* ستايل حقل الإدخال */
        .form-control {
            background-color: rgba(0, 0, 0, 0.8);
            color: #FFFFFF;
            border: 2px solid #9f0eff;
            box-shadow: 0 0 15px rgba(248, 0, 140, 0.8);
            border-radius: 15px;
            padding: 15px;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #FFFF00;
            box-shadow: 0 0 20px rgba(210, 9, 9, 0.9);
        }

        /* ستايل خانة الهدايا (الـ select) */
        .reward-select {
            background-size: cover;
            color: #2a7eac;
            border: 2px solid #9e2e2e;
            box-shadow: 0 0 20px #000000d1, 0 0 40px rgba(255, 255, 0, 0.5);
            border-radius: 15px;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-repeat: no-repeat;
            background-position: right 10px center;
            cursor: pointer;
        }

        .reward-select option {
            background-color: #0715125c;
            color: #FFFFFF;
            padding: 10px;
            border-radius: 15px;
            font-size: 16px;
        }

        .reward-select option:hover {
            background-color: #00FF00;
            color: #000000;
        }

        /* ستايل الأزرار */
        .roblox-btn {
            background: linear-gradient(45deg, #090e99, #2673e6);
            color: #000000 !important;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            box-shadow: 0 5px 20px rgba(25, 0, 255, 0.7), 0 0 40px rgba(241, 7, 7, 0.921);
            transition: all 0.4s ease;
            padding: 15px 30px;
            font-size: 18px;
        }

        .roblox-btn:hover {
            background: linear-gradient(45deg, #2f00ff, #9b01b9);
            color: #FFFFFF !important;
            box-shadow: 0 10px 30px rgba(210, 9, 9, 0.9);
            transform: translateY(-5px);
        }

        .roblox-btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 15px rgba(0, 255, 0, 0.5);
        }

        /* تحسينات عامة */
        .P1, .P2 {
            text-align: center;
            padding: 20px;
        }

        hr {
            border-color: #FFFFFF;
            box-shadow: 0 0 10px #00FF00;
        }

        .SCARED, .YESNO {
            background-color: rgba(231, 16, 16, 0.7);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 20px #00FF00;
        }

        /* نصوص مفتاحية */
        strong {
            color: #FFFF00;
            text-shadow: 0 0 10px #00FF00;
        }
    </style>
</head>
